name: Sync Harden vacancies

# Runs the scraper on a schedule, updates units.json + the in-page snapshot,
# and commits any changes. If you deploy from this repo (GitHub Pages, Netlify,
# Vercel, Cloudflare Pages), the commit triggers a fresh deploy automatically.

on:
  schedule:
    - cron: '0 * * * *'   # every 1 hour (UTC). Adjust as you like.
  workflow_dispatch: {}       # lets you run it manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: harden-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync vacancies from the live feed
        run: node sync.mjs

      - name: Commit updated data
        run: |
          if [[ -n "$(git status --porcelain units.json index.html)" ]]; then
            git config user.name  "harden-sync-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add units.json index.html
            git commit -m "chore: sync Harden vacancies ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          else
            echo "No changes to commit."
          fi
